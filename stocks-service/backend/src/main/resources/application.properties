spring.application.name=stocks-service
server.port=8083
spring.datasource.url=jdbc:mariadb://stocks-db:3306/stocks_db
spring.datasource.username=stocks_user
spring.datasource.password=stocks_pass
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
logging.level.com.transfafrica=INFO
