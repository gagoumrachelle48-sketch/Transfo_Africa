<div class="fournisseur-form">
  <div class="form-card">
    <h2>{{ isEdit ? 'Modifier le fournisseur' : 'Nouveau fournisseur' }}</h2>
    <form (ngSubmit)="save()">
      <div class="form-row">
        <div class="form-group">
          <label>Nom *</label>
          <input type="text" [(ngModel)]="fournisseur.nom" name="nom" required placeholder="Nom du fournisseur"/>
        </div>
        <div class="form-group">
          <label>Contact</label>
          <input type="text" [(ngModel)]="fournisseur.contact" name="contact" placeholder="Nom du contact"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="fournisseur.email" name="email" placeholder="email@fournisseur.com"/>
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="text" [(ngModel)]="fournisseur.telephone" name="telephone" placeholder="+33 1 00 00 00 00"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Adresse</label>
          <input type="text" [(ngModel)]="fournisseur.adresse" name="adresse" placeholder="Adresse complète"/>
        </div>
        <div class="form-group">
          <label>Pays</label>
          <input type="text" [(ngModel)]="fournisseur.pays" name="pays" placeholder="France, Cameroun..."/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>SIRET</label>
          <input type="text" [(ngModel)]="fournisseur.siret" name="siret" placeholder="Numéro SIRET"/>
        </div>
        <div class="form-group">
          <label>Statut</label>
          <select [(ngModel)]="fournisseur.statut" name="statut">
            <option value="ACTIF">Actif</option>
            <option value="INACTIF">Inactif</option>
            <option value="BLACKLISTE">Blacklisté</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea [(ngModel)]="fournisseur.notes" name="notes" rows="3" placeholder="Notes..."></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">Annuler</button>
        <button type="submit" class="btn-save">{{ isEdit ? 'Mettre à jour' : 'Créer' }}</button>
      </div>
    </form>
  </div>
</div>
