server:
  port: 8090

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mariadb://${DB_HOST:auth-db}:${DB_PORT:3306}/transfo_auth
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:TransfoAfricaERP2026SecretKeyMustBeAtLeast256BitsLongForHS256Algorithm}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

cors:
  allowed-origins: ${CORS_ORIGINS:http://192.168.1.132:4200,http://localhost:4200}

logging:
  level:
    com.transfoafrica.auth: INFO
    org.springframework.security: INFO
