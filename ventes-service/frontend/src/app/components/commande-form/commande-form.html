<div class="commande-form">
  <div class="form-card">
    <h2>Nouvelle commande</h2>
    <form (ngSubmit)="save()">
      <div class="form-row">
        <div class="form-group">
          <label>Nom du client *</label>
          <input type="text" [(ngModel)]="commande.clientNom" name="clientNom" required placeholder="Nom du client"/>
        </div>
        <div class="form-group">
          <label>ID Contact</label>
          <input type="number" [(ngModel)]="commande.contactId" name="contactId" placeholder="ID du contact"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date de livraison</label>
          <input type="date" [(ngModel)]="commande.dateLivraison" name="dateLivraison"/>
        </div>
        <div class="form-group">
          <label>Statut</label>
          <select [(ngModel)]="commande.statut" name="statut">
            <option value="BROUILLON">Brouillon</option>
            <option value="CONFIRME">Confirmé</option>
            <option value="EN_COURS">En cours</option>
          </select>
        </div>
      </div>

      <div class="lignes-section">
        <div class="lignes-header">
          <h3>Lignes de commande</h3>
          <button type="button" class="btn-add" (click)="addLigne()">+ Ajouter une ligne</button>
        </div>
        <table class="lignes-table">
          <thead>
            <tr><th>Désignation</th><th>Qté</th><th>Prix unitaire</th><th>Total</th><th></th></tr>
          </thead>
          <tbody>
            <tr *ngFor="let ligne of commande.lignes; let i = index">
              <td><input type="text" [(ngModel)]="ligne.designation" [name]="'des'+i" placeholder="Article..."/></td>
              <td><input type="number" [(ngModel)]="ligne.quantite" [name]="'qty'+i" (input)="calcTotal(ligne)" min="1"/></td>
              <td><input type="number" [(ngModel)]="ligne.prixUnitaire" [name]="'pu'+i" (input)="calcTotal(ligne)" step="0.01"/></td>
              <td class="total-cell">{{ (ligne.quantite * ligne.prixUnitaire) | number:'1.2-2' }} €</td>
              <td><button type="button" class="btn-remove" (click)="removeLigne(i)">✕</button></td>
            </tr>
          </tbody>
        </table>
        <div class="grand-total">Total : <strong>{{ total | number:'1.2-2' }} €</strong></div>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea [(ngModel)]="commande.notes" name="notes" rows="2" placeholder="Notes..."></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">Annuler</button>
        <button type="submit" class="btn-save">Créer la commande</button>
      </div>
    </form>
  </div>
</div>
