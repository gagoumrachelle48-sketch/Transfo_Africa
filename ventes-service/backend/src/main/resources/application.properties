spring.application.name=ventes-service
server.port=8082
spring.datasource.url=jdbc:mariadb://ventes-db:3306/ventes_db
spring.datasource.username=ventes_user
spring.datasource.password=ventes_pass
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
logging.level.com.transfafrica=INFO
contacts.service.url=http://contacts-backend:8081
