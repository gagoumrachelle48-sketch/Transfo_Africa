spring.application.name=facturation-service
server.port=8085
spring.datasource.url=jdbc:mariadb://facturation-db:3306/facturation_db
spring.datasource.username=facturation_user
spring.datasource.password=facturation_pass
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
logging.level.com.transfafrica=INFO
