server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://192.168.1.132:4200"
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: auth-service
          uri: http://auth-service:8090
          predicates:
            - Path=/api/auth/**

        - id: contacts-service
          uri: http://contacts-backend:8081
          predicates:
            - Path=/api/contacts/**

        - id: ventes-service
          uri: http://ventes-backend:8082
          predicates:
            - Path=/api/ventes/**

        - id: stocks-service
          uri: http://stocks-backend:8083
          predicates:
            - Path=/api/stocks/**

        - id: achats-service
          uri: http://achats-backend:8084
          predicates:
            - Path=/api/achats/**

        - id: facturation-service
          uri: http://facturation-backend:8085
          predicates:
            - Path=/api/facturation/**

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.transfoafrica.gateway: INFO
